name: GA4 and Firebase to BigQuery

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ga4-firebase-to-bigquery
  cancel-in-progress: false

jobs:
  ga4-firebase-to-bigquery:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export GA4 and Firebase data to BigQuery
        env:
          # Required GitHub Actions secret containing the complete
          # Google service-account JSON object.
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}

          # Leave BIGQUERY_PROJECT_ID empty to use project_id from the
          # service-account JSON.
          BIGQUERY_PROJECT_ID: ${{ vars.BIGQUERY_PROJECT_ID }}
          BIGQUERY_DATASET_ID: ${{ vars.BIGQUERY_DATASET_ID || 'ga4_firebase' }}
          BIGQUERY_TABLE_ID: ${{ vars.BIGQUERY_TABLE_ID || 'all_apps_analytics' }}
          BIGQUERY_LOCATION: ${{ vars.BIGQUERY_LOCATION || 'US' }}
          BIGQUERY_WRITE_DISPOSITION: ${{ vars.BIGQUERY_WRITE_DISPOSITION || 'WRITE_TRUNCATE' }}

          START_DATE: ${{ vars.START_DATE || '7daysAgo' }}
          END_DATE: ${{ vars.END_DATE || 'today' }}
          TIMEZONE: ${{ vars.TIMEZONE || 'Asia/Karachi' }}

          PERSONALIZED_TOP_N: ${{ vars.PERSONALIZED_TOP_N || '5' }}
          
          SCREEN_FIELD_CANDIDATES: ${{ vars.SCREEN_FIELD_CANDIDATES || 'unifiedPagePathScreen,unifiedScreenName,unifiedScreenClass,screenName,screenClass' }}
          HOME_SCREEN_KEYWORDS: ${{ vars.HOME_SCREEN_KEYWORDS || 'home,main,dashboard,landing,start' }}
          APP_OPEN_EVENT_NAMES: ${{ vars.APP_OPEN_EVENT_NAMES || 'session_start,app_open,first_open' }}
          HOME_EVENT_KEYWORDS: ${{ vars.HOME_EVENT_KEYWORDS || 'home,main,dashboard,landing' }}

          TIME_CAPPING_PARAMETER_KEYWORDS: ${{ vars.TIME_CAPPING_PARAMETER_KEYWORDS || 'ad_time_capping,time_capping,ad_capping,interstitial_time_capping,app_open_time_capping,capping' }}
          IAP_SCREEN_PARAMETER: ${{ vars.IAP_SCREEN_PARAMETER || 'premium_visibility' }}

          IAP_SCREEN_PARAMETER_KEYWORDS: ${{ vars.IAP_SCREEN_PARAMETER_KEYWORDS || 'iap_screen,iap_screen_variant,iap_paywall,iap,paywall,premium_visibility,premium,premium_screen,premium_dialog,premium_popup,premium_modal,premium_offer,premium_plan,subscription,subscription_screen,subscription_dialog,subscription_popup,subscribe,subscribe_screen,purchase,purchase_screen,purchase_flow,purchase_dialog,checkout,billing,billing_screen,pricing,pricing_screen,price_screen,plans,plan_screen,offers,offers_screen,upgrade,upgrade_screen,pro,pro_screen,trial,trial_screen,free_trial,membership,entitlement,product,product_id,sku,visibility,show_premium,show_paywall,enable_premium,enable_paywall' }}
          REMOTE_PARAMETER_LIMIT: ${{ vars.REMOTE_PARAMETER_LIMIT || '20' }}

          REMOTE_CONFIG_NAMESPACE: ${{ vars.REMOTE_CONFIG_NAMESPACE || 'firebase' }}
          FIREBASE_REMOTE_CONFIG_API_BASE: ${{ vars.FIREBASE_REMOTE_CONFIG_API_BASE || 'https://firebaseremoteconfig.googleapis.com/v1' }}
          FIREBASE_MANAGEMENT_API_BASE: ${{ vars.FIREBASE_MANAGEMENT_API_BASE || 'https://firebase.googleapis.com/v1beta1' }}
          FCM_DATA_API_BASE: ${{ vars.FCM_DATA_API_BASE || 'https://fcmdata.googleapis.com/v1beta1' }}
          FCM_DATA_PAGE_SIZE: ${{ vars.FCM_DATA_PAGE_SIZE || '1000' }}

          GA4_ADMIN_API_BASE: ${{ vars.GA4_ADMIN_API_BASE || 'https://analyticsadmin.googleapis.com/v1beta' }}
          GA4_ADMIN_AUDIENCE_API_BASE: ${{ vars.GA4_ADMIN_AUDIENCE_API_BASE || 'https://analyticsadmin.googleapis.com/v1alpha' }}

          REQUEST_TIMEOUT_SECONDS: ${{ vars.REQUEST_TIMEOUT_SECONDS || '45' }}
          MAX_RETRIES: ${{ vars.MAX_RETRIES || '5' }}
          CONTINUE_ON_ERROR: ${{ vars.CONTINUE_ON_ERROR || 'true' }}

        run: python ga4_firebase_to_bigquery.py
