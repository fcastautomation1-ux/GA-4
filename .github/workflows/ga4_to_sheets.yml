name: GA4 to Google Sheets

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App name"
        required: true
      property_id:
        description: "GA4 Property ID"
        required: true
      home_screen_name:
        description: "Home screen name/class"
        required: true

  schedule:
    - cron: "0 4 * * *"

jobs:
  ga4-to-sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run GA4 script
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

          APP_NAME: ${{ github.event.inputs.app_name || vars.APP_NAME }}
          GA4_PROPERTY_ID: ${{ github.event.inputs.property_id || vars.GA4_PROPERTY_ID }}
          HOME_SCREEN_NAME: ${{ github.event.inputs.home_screen_name || vars.HOME_SCREEN_NAME }}

          SCREEN_FIELD: unifiedPagePathScreen
        run: python ga4_to_sheets.py
