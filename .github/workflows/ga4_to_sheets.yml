name: GA4 to Google Sheets

on:
  workflow_dispatch:

  schedule:
    - cron: "0 4 * * *"

jobs:
  ga4-to-sheets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run GA4 script
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

          START_DATE: ${{ vars.START_DATE || '28daysAgo' }}
          END_DATE: ${{ vars.END_DATE || 'yesterday' }}
          RETENTION_DAYS: ${{ vars.RETENTION_DAYS || '7' }}

          APPS_CONFIG_SHEET: Apps Config
          SUMMARY_SHEET: GA4 Funnel Summary
          DETAILS_SHEET: GA4 Funnel Details
          USER_SESSION_SHEET: GA4 User Session Summary
          RETENTION_DETAILS_SHEET: GA4 Retention Details
          AUDIENCE_SEGMENTS_SHEET: GA4 Audience Segments
          PERSONALIZED_UX_SHEET: GA4 Personalized User Experience
          REMOTE_CONFIG_SHEET: GA4 Remote Configuration
          TIME_CAPPING_AB_SHEET: Firebase AB Time Capping
          DAILY_NOTIFICATIONS_SHEET: Firebase Daily Notifications
          GA4_NOTIFICATION_EVENTS_SHEET: GA4 Notification Events
          FCM_DELIVERY_SHEET: Firebase Notification Delivery
          BIGQUERY_EXPORT_SHEET: BigQuery Unified Export

          PERSONALIZED_TOP_N: ${{ vars.PERSONALIZED_TOP_N || '10' }}
          REMOTE_CONFIG_EVENT_LIMIT: ${{ vars.REMOTE_CONFIG_EVENT_LIMIT || '25' }}
          REMOTE_CONFIG_APP_VERSION_LIMIT: ${{ vars.REMOTE_CONFIG_APP_VERSION_LIMIT || '10' }}
          TIME_CAPPING_PARAMETER: ${{ vars.TIME_CAPPING_PARAMETER || 'ad_time_capping' }}
          REMOTE_CONFIG_NAMESPACE: ${{ vars.REMOTE_CONFIG_NAMESPACE || 'firebase' }}
          FIREBASE_REMOTE_CONFIG_TIMEOUT: ${{ vars.FIREBASE_REMOTE_CONFIG_TIMEOUT || '30' }}
          DAILY_NOTIFICATION_PARAMETERS: ${{ vars.DAILY_NOTIFICATION_PARAMETERS || '' }}
          NOTIFICATION_PARAMETER_KEYWORDS: ${{ vars.NOTIFICATION_PARAMETER_KEYWORDS || 'notification,notifications,notify,notif,push,daily_notification,daily_notifications,daily_push,reminder,fcm' }}
          NOTIFICATION_EVENT_NAMES: ${{ vars.NOTIFICATION_EVENT_NAMES || 'notification_receive,notification_foreground,notification_open,notification_dismiss' }}
          NOTIFICATION_EVENT_LIMIT: ${{ vars.NOTIFICATION_EVENT_LIMIT || '500' }}
          FCM_DATA_PAGE_SIZE: ${{ vars.FCM_DATA_PAGE_SIZE || '1000' }}

          DEFAULT_HOME_SCREEN_NAME: MainActivity
          DEFAULT_SCREEN_FIELD: unifiedPagePathScreen
          TIMEZONE: Asia/Karachi

        run: python ga4_to_sheets.py
